name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip \
            openjdk-17-jdk \
            python3-pip \
            autoconf libtool-bin pkg-config \
            zlib1g-dev libncurses-dev libtinfo-dev \
            cmake libffi-dev libssl-dev \
            autoconf-archive gettext

      - name: Install Buildozer
        run: |
          pip install --user cython buildozer
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build with Buildozer (and fix autotools)
        run: |
          # First, let buildozer download and unpack everything
          buildozer android debug || true   # Ignore failure, we'll fix and retry
          
          # Find any configure.ac that needs autoreconf
          find .buildozer -name "configure.ac" -exec dirname {} \; | while read dir; do
            echo "Running autoreconf -fi in $dir"
            (cd "$dir" && autoreconf -fi)
          done
          
          # Now run the actual build again
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: msfetcher-apk
          path: bin/*.apk
