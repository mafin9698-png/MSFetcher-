name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies (including gtk-doc-tools)
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip \
            openjdk-17-jdk \
            python3-pip \
            autoconf libtool-bin pkg-config \
            zlib1g-dev libncurses-dev libtinfo-dev \
            cmake libffi-dev libssl-dev \
            autoconf-archive gettext gtk-doc-tools

      - name: Install Buildozer
        run: |
          pip install --user cython buildozer
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: First build (to unpack sources, will fail – that's OK)
        continue-on-error: true
        run: |
          buildozer android debug

      - name: 🔧 Comprehensive Autotools Fix
        run: |
          # Find every directory containing configure.ac or configure.in
          find .buildozer -type f \( -name "configure.ac" -o -name "configure.in" \) -exec dirname {} \; | while read dir; do
            echo "🔄 Processing $dir"
            cd "$dir"
            
            # Add missing macro if needed (create a simple configure.ac if it's completely broken)
            if ! grep -q "LT_INIT" configure.* 2>/dev/null; then
              echo "LT_INIT" >> configure.ac
            fi
            
            # Run autoupdate to fix deprecated macros
            autoupdate 2>/dev/null || true
            
            # Run autoreconf to generate everything
            autoreconf -fi
            
            cd -
          done
          
          # Specifically handle gtk-doc if it's causing issues
          find .buildozer -name "gtk-doc.make" -exec dirname {} \; | while read dir; do
            if [ ! -f "$dir/gtk-doc.make" ]; then
              wget -q https://gitlab.gnome.org/GNOME/gtk-doc/-/raw/main/data/gtk-doc.make -O "$dir/gtk-doc.make"
            fi
          done

      - name: 🚀 Final build (should succeed)
        run: |
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: msfetcher-apk
          path: bin/*.apk
