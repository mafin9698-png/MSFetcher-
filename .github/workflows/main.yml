name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies (including gtk-doc-tools)
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip \
            openjdk-17-jdk \
            python3-pip \
            autoconf libtool-bin pkg-config \
            zlib1g-dev libncurses-dev libtinfo-dev \
            cmake libffi-dev libssl-dev \
            autoconf-archive gettext gtk-doc-tools

      - name: Install Buildozer
        run: |
          pip install --user cython buildozer
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: First build (unpack sources, will fail – that's OK)
        continue-on-error: true
        run: |
          buildozer android debug

      - name: 🔧 Aggressive Autotools Repair
        run: |
          # Find all configure.ac/configure.in files
          find .buildozer -type f \( -name "configure.ac" -o -name "configure.in" \) -exec dirname {} \; | sort -u | while read dir; do
            echo "🛠️ Repairing $dir"
            cd "$dir"
            
            # 1. Add missing macro definitions if not present
            if ! grep -q "LT_SYS_SYMBOL_USCORE" configure.* 2>/dev/null; then
              # Insert after AC_INIT or at top
              sed -i '/^AC_INIT/a m4_pattern_allow([LT_SYS_SYMBOL_USCORE])' configure.ac 2>/dev/null || true
            fi
            
            # 2. Add LT_INIT if missing
            if ! grep -q "LT_INIT" configure.* 2>/dev/null; then
              sed -i '/^AC_INIT/a LT_INIT' configure.ac 2>/dev/null || true
            fi
            
            # 3. Fix AC_REQUIRE errors (move inside AC_DEFUN if needed – simplified: comment out the line)
            # This is a blunt fix – uncomment if needed
            # sed -i '/AC_REQUIRE/s/^/#/' configure.ac
            
            # 4. Run autoupdate to modernise macros
            autoupdate 2>/dev/null || true
            
            # 5. Run autoreconf to regenerate everything
            autoreconf -fi
            
            cd -
          done

          # 6. Handle gtk-doc.make separately
          find .buildozer -name "Makefile.am" -exec grep -l "gtk-doc.make" {} \; | while read am; do
            d=$(dirname "$am")
            if [ ! -f "$d/gtk-doc.make" ]; then
              wget -q https://gitlab.gnome.org/GNOME/gtk-doc/-/raw/main/data/gtk-doc.make -O "$d/gtk-doc.make"
            fi
          done

      - name: 🚀 Final build (should succeed)
        run: |
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: msfetcher-apk
          path: bin/*.apk
